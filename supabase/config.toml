  # Growth OS vibe-coding studio (#86): Paige drafts a branded landing page from a brief.
  # JWT-gated like content-draft (the fn re-verifies the caller and role-gates to
  # admin/coach/super_admin); pure draft, zero DB writes.
  [functions.growth-page-draft]
    verify_jwt = true

  # Vibe Studio Phase 1 (§18): the single-entry-point classifier — one brief in, a cheap
  # judgment of "page"|"form"|"copy"|"image" out. JWT-gated like growth-page-draft; never
  # writes to the database and never fails closed on a legitimate brief (defaults to "page").
  [functions.growth-studio-route]
    verify_jwt = true

  # Vibe Studio Phase 1 (§18): the form-mode mirror of growth-page-draft — derives a real
  # GrowthFormSchema from one brief, no page/blocks/theme. JWT-gated the same way; pure
  # draft, zero DB writes.
  [functions.growth-form-draft]
    verify_jwt = true

  # Vibe Studio conversational per-section edit: one instruction + one GrowthBlock -> the
  # revised GrowthBlock. JWT-gated (the fn re-verifies the caller, role-gates to
  # admin/coach/super_admin, and pins the tenant to current_user_tenant_id() — a JWT caller's
  # body tenant_id is IGNORED); service-role callers (Paige's agent, §10) may name a tenant.
  # Pure draft, zero DB writes.
  [functions.growth-block-edit]
    verify_jwt = true

  # Vibe Studio on-submit AUTOMATION EXECUTOR. NOT user-facing — fired by the growth_form_submissions
  # trigger / recovery sweeper with {submission_id}. verify_jwt = false because it does its OWN auth
  # (service-role bearer OR a valid Vault cron token, fail-closed); the tenant is taken from the
  # CLAIMED submission row, never the body (§9). Runs the form's configured automations exactly once
  # each (contact upsert -> pipeline attach -> Paige action -> rail -> notify), idempotent + honest.
  [functions.growth-process-submission]
    verify_jwt = false

  # The §8 action-bus DRAINER — on a */2 cron it claims 'filed' paige_actions whose kind has a drafting
  # sub-agent, has that agent draft the work through the orchestrator, and advances to 'drafted' (which
  # routes send-kinds to the approval lane). NOT user-facing (verify_jwt=false): authorized ONLY by the
  # service-role bearer OR a valid Vault cron token, fail-closed; tenant taken from the CLAIMED row (§9).
  [functions.paige-action-worker]
    verify_jwt = false

  # The per-site Paige chatbot — the tenant's own Paige answering visitors on their PUBLISHED growth
  # site. NET-NEW ANONYMOUS PUBLIC endpoint (verify_jwt = false): its own controls ARE the gate —
  # tenant resolved server-side from the public slug (never trusted from the body), tool-less +
  # read-only, per-IP/per-tenant/platform-global rate limits (cost backstops fail closed), grounded
  # only in the tenant's published pages + persona. §2/§3 clean.
  [functions.paige-public-chat]
    verify_jwt = false

