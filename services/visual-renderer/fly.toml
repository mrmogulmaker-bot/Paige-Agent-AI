# Fly.io deploy config for the Paige visual renderer. Deploy:  fly deploy   (from services/visual-renderer/)
app = "paige-visual-renderer"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"   # scale to zero when idle (keeps the ~$5-15/mo floor low)
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"                    # Chromium needs headroom; 512mb OOMs on complex pages

[checks.health]
  type = "http"
  port = 8080
  path = "/healthz"
  interval = "30s"
  timeout = "5s"
